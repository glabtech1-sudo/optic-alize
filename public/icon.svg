<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Beautiful modern rounded slate background -->
  <rect width="100%" height="100%" fill="#0f172a" rx="112"/>
  
  <g transform="translate(0, 0)">
    <!-- Outer optical aura rings -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#00BCD4" stroke-width="12" stroke-opacity="0.25"/>
    <circle cx="256" cy="256" r="140" fill="none" stroke="#00BCD4" stroke-width="16" stroke-opacity="0.45"/>
    
    <!-- Eye Contour Shape -->
    <path d="M110 256C160 170 220 135 256 135C292 135 352 170 402 256C352 342 292 377 256 377C220 377 160 342 110 256Z" 
          fill="none" stroke="#0097A7" stroke-width="22" stroke-linejoin="round"/>
          
    <path d="M130 256C175 185 228 155 256 155C284 155 337 185 382 256C337 327 284 357 256 357C228 357 175 327 130 256Z" 
          fill="none" stroke="#00BCD4" stroke-width="12" stroke-linejoin="round"/>
          
    <!-- Iris & Pupil -->
    <circle cx="256" cy="256" r="75" fill="none" stroke="#00BCD4" stroke-width="8"/>
    <circle cx="256" cy="256" r="60" fill="#0097A7"/>
    <circle cx="256" cy="256" r="40" fill="#0f172a"/>
    
    <!-- Gloss / Reflection -->
    <circle cx="272" cy="240" r="15" fill="#ffffff" opacity="0.9"/>
    <circle cx="242" cy="268" r="7" fill="#ffffff" opacity="0.7"/>
    
    <!-- Technical optic lens measure marks -->
    <line x1="256" y1="50" x2="256" y2="75" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="437" x2="256" y2="462" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="256" x2="75" y2="256" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="437" y1="256" x2="462" y2="256" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
